name: nightly-features

# Recompute features for every sport from the latest ingested data.
on:
  schedule:
    - cron: '30 4 * * *' # 04:30 UTC daily
  workflow_dispatch: {}

jobs:
  features:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Compute features (all sports)
        run: npx tsx src/prediction/scripts/computeFeatures.ts
